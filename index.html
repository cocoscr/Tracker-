<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F1613" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spese" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#128176;</text></svg>" />
  <title>Portafoglio</title>

  <!-- Librerie da CDN (tutte da cdnjs) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/umd/lucide.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #0F1613; }
    ::-webkit-scrollbar { height: 0; width: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo } = React;
    const {
      AreaChart, Area, BarChart, Bar, Cell, ReferenceLine,
      XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid,
    } = Recharts;

    // ---- config: sostituisci con il tuo Sheet ID se cambia ----
    const SHEET_ID = "1J36Imy-qTi4Ubr3s-CuzBcgzU1PGtDSQlsjE0Ap3zIY";
    const SHEET_NAME = "Transazioni";
    // foglio opzionale nello stesso file: colonne "Categoria" e "Budget" per sovrascrivere i budget automatici
    const BUDGET_SHEET_NAME = "Budget";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const BUDGET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(BUDGET_SHEET_NAME)}`;

    // ---- modifica qui l'elenco delle categorie considerate spese FISSE ----
    const CATEGORIE_FISSE = ["Bollette", "Assicurazioni", "Abbonamenti", "Casa", "PAC", "Università"];

    const C = {
      bg: "#0F1613",
      surface: "#171F1B",
      surfaceAlt: "#1D2622",
      hairline: "#2A3630",
      ink: "#F4F1E8",
      inkMuted: "#9CA8A1",
      paper: "#F7F3E9",
      paperInk: "#241F16",
      paperMuted: "#8A8073",
      green: "#4ADE80",
      coral: "#F2777B",
      amber: "#E8B44C",
    };
    const fontDisplay = "'Space Mono', ui-monospace, 'SF Mono', Menlo, monospace";
    const fontBody = "'Manrope', ui-sans-serif, system-ui, -apple-system, sans-serif";

    // colore stabile per ogni categoria (sempre lo stesso, ovunque)
    const PALETTE = ["#E8B44C", "#7FB3D5", "#C39BD3", "#F7DC6F", "#82E0AA", "#F0B27A", "#76D7C4", "#F1948A", "#AED6F1", "#D7BDE2"];
    function colorFor(nome) {
      let h = 0;
      for (let i = 0; i < nome.length; i++) h = (h * 31 + nome.charCodeAt(i)) >>> 0;
      return PALETTE[h % PALETTE.length];
    }

    // ---- icone da lucide (UMD), con alias di riserva ----
    function nodoIcona(nomi) {
      if (typeof lucide === "undefined" || !lucide.icons) return null;
      for (const n of nomi) if (lucide.icons[n]) return lucide.icons[n];
      return null;
    }
    function Icona({ nomi, size = 16, className = "", style = {} }) {
      const node = nodoIcona(nomi);
      if (!node) return <span style={{ fontSize: size * 0.8, lineHeight: 1, ...style }} className={className}>●</span>;
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
          strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>
          {node.map(([tag, attrs], i) => React.createElement(tag, { key: i, ...attrs }))}
        </svg>
      );
    }

    const iconMap = {
      "Bollette": ["Zap"], "Assicurazioni": ["Shield"], "Spese Personali": ["User"],
      "Benzina": ["Fuel"], "Cibo SM": ["ShoppingCart"], "Lavoro": ["Briefcase"],
      "Salute": ["HeartPulse"], "Abbonamenti": ["Repeat"], "Casa": ["House", "Home"],
      "Regali": ["Gift"], "Stipendio": ["Banknote"], "Trasferte": ["Plane"],
      "PAC": ["PiggyBank"], "Macchina": ["Car"], "Università": ["GraduationCap"],
      "Carta di Credito": ["CreditCard"],
    };
    const iconeFor = (cat) => iconMap[cat] || ["Tag"];

    // Parsa importi sia in formato italiano ("€ 1.234,56") che inglese ("€ 1,234.56" / "€ 12.04").
    // Il segno viene dedotto dal Tipo, non dal testo: Spesa/Uscita = negativo, Entrata = positivo.
    function parseImporto(str, tipo) {
      if (!str) return 0;
      const cleaned = String(str).replace(/[^0-9.,]/g, "");
      if (!cleaned) return 0;
      const lastComma = cleaned.lastIndexOf(",");
      const lastDot = cleaned.lastIndexOf(".");
      let normalized;
      if (lastComma > lastDot) normalized = cleaned.replace(/\./g, "").replace(/,/g, ".");
      else if (lastDot > lastComma) normalized = cleaned.replace(/,/g, "");
      else normalized = cleaned;
      const val = Math.abs(parseFloat(normalized) || 0);
      return /spesa|uscita/i.test(tipo || "") ? -val : val;
    }

    // Deriva il mese direttamente dalla colonna Data (gg/mm/aaaa), così etichette
    // come "lug 2026" e "Jul 2026" non possono più risultare mesi distinti.
    const MESI_ABBR = ["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
    function parseDataOggetto(str) {
      const m = /^\s*(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/.exec(str || "");
      if (!m) return null;
      const g = parseInt(m[1], 10), me = parseInt(m[2], 10);
      let a = parseInt(m[3], 10); if (a < 100) a += 2000;
      if (me < 1 || me > 12) return null;
      return new Date(a, me - 1, g);
    }
    const meseAbbrLabel = (d) => (d ? `${MESI_ABBR[d.getMonth()]} ${d.getFullYear()}` : "");

    const euro = (n) =>
      Math.abs(n).toLocaleString("it-IT", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const euro0 = (n) =>
      Math.abs(n).toLocaleString("it-IT", { maximumFractionDigits: 0 });

    // ---- mesi: riconosce "gennaio 2026", "Gen", "01/2026" e ordina ----
    const MESI_IT = ["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];

    function infoMese(label) {
      const lower = (label || "").toLowerCase();
      let meseIdx = MESI_IT.findIndex((n) => lower.startsWith(n.slice(0, 3)) || lower.includes(n));
      if (meseIdx === -1) {
        const num = lower.match(/(?:^|\D)(0?[1-9]|1[0-2])(?:\D|$)/);
        if (num) meseIdx = parseInt(num[1], 10) - 1;
      }
      const yearMatch = lower.match(/(20\d{2})/);
      const anno = yearMatch ? parseInt(yearMatch[1], 10) : null;
      return { meseIdx, anno };
    }
    function chiaveOrdinamentoMese(label, fallbackIndex) {
      const { meseIdx, anno } = infoMese(label);
      if (meseIdx === -1) return 100000 + fallbackIndex;
      return (anno || 0) * 12 + meseIdx;
    }

    // giorno del mese da una data tipo "15/03/2026", "15-3-26" o "2026-03-15"
    function parseGiorno(dataStr) {
      if (!dataStr) return null;
      const iso = dataStr.match(/^\s*(20\d{2})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/);
      if (iso) return parseInt(iso[3], 10);
      const it = dataStr.match(/^\s*(\d{1,2})[\/\-.](\d{1,2})/);
      if (it) return parseInt(it[1], 10);
      return null;
    }

    function useSheetData() {
      const [state, setState] = useState({ loading: true, error: null, rows: [], budgetManuale: {} });
      const [tick, setTick] = useState(0);
      const ricarica = () => {
        setState((s) => ({ ...s, loading: true, error: null }));
        setTick((t) => t + 1);
      };

      useEffect(() => {
        let cancelled = false;

        const caricaTransazioni = fetch(CSV_URL)
          .then((res) => {
            if (!res.ok) throw new Error("Impossibile leggere il foglio (è condiviso come 'chiunque con il link'?)");
            return res.text();
          })
          .then((csvText) => {
            const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
            return parsed.data
              .map((r) => {
                const tipo = (r["Tipo"] || "").trim();
                const categoria = (r["Categoria"] || "Altro").trim();
                const dataObj = parseDataOggetto(r["Data"]);
                return {
                  data: r["Data"],
                  dataObj,
                  tipo,
                  descrizione: r["Descrizione"] || "",
                  categoria,
                  metodo: r["Metodo"],
                  conto: r["Conto"],
                  // Importo e Mese vengono ricavati dalle colonne sorgente (Importo, Data):
                  // le colonne calcolate del foglio ("importo ricalcolato", "Mese") non sono più usate.
                  importo: parseImporto(r["Importo"], tipo),
                  mese: meseAbbrLabel(dataObj),
                  // Movimenti tra conti propri: esclusi dai totali, contati a parte.
                  trasferimento: categoria === "Trasferimento" || /^trasf/i.test(tipo),
                };
              })
              .filter((r) => r.dataObj && (r.tipo === "Spesa" || r.tipo === "Entrata" || /^trasf/i.test(r.tipo)))
              .sort((a, b) => a.dataObj - b.dataObj);
          });

        // il foglio "Budget" è opzionale: se non esiste, si prosegue con i budget automatici
        const caricaBudget = fetch(BUDGET_CSV_URL)
          .then((res) => (res.ok ? res.text() : ""))
          .then((csv) => {
            const map = {};
            if (!csv || csv.trim().startsWith("<")) return map; // risposta HTML = foglio inesistente
            const parsed = Papa.parse(csv, { header: true, skipEmptyLines: true });
            (parsed.data || []).forEach((r) => {
              const cat = (r["Categoria"] || "").trim();
              const val = parseImporto(r["Budget"]);
              if (cat && val > 0) map[cat] = val;
            });
            return map;
          })
          .catch(() => ({}));

        Promise.all([caricaTransazioni, caricaBudget])
          .then(([rows, budgetManuale]) => {
            if (!cancelled) setState({ loading: false, error: null, rows, budgetManuale });
          })
          .catch((err) => {
            if (!cancelled) setState({ loading: false, error: err.message, rows: [], budgetManuale: {} });
          });

        return () => { cancelled = true; };
      }, [tick]);

      return { ...state, ricarica };
    }

    function SegmentToggle({ options, value, onChange, accent = C.green }) {
      return (
        <div className="flex rounded-full p-1 overflow-x-auto max-w-full"
          style={{ background: C.surfaceAlt, border: `1px solid ${C.hairline}`, scrollbarWidth: "none", WebkitOverflowScrolling: "touch" }}>
          {options.map((k) => (
            <button key={k} onClick={() => onChange(k)}
              className="px-3 py-1 text-xs rounded-full transition-colors whitespace-nowrap shrink-0"
              style={{ fontFamily: fontBody, fontWeight: 600, color: value === k ? C.bg : C.inkMuted, background: value === k ? accent : "transparent" }}>
              {k}
            </button>
          ))}
        </div>
      );
    }

    function StatChip({ label, value, delta, positive, sub, subColor }) {
      const hasDelta = delta !== null && delta !== undefined && isFinite(delta);
      const frecce = delta >= 0 ? ["ArrowUpRight"] : ["ArrowDownRight"];
      const good = positive ? delta >= 0 : delta < 0;
      return (
        <div className="flex-1 rounded-2xl p-4 min-w-[130px]" style={{ background: C.surfaceAlt, border: `1px solid ${C.hairline}` }}>
          <div className="text-xs mb-1" style={{ color: C.inkMuted, fontFamily: fontBody, letterSpacing: "0.04em" }}>{label}</div>
          <div className="text-xl" style={{ color: C.ink, fontFamily: fontDisplay, fontWeight: 700 }}>€ {euro(value)}</div>
          {hasDelta && (
            <div className="flex items-center gap-1 mt-1 text-xs" style={{ color: good ? C.green : C.coral, fontFamily: fontBody }}>
              <Icona nomi={frecce} size={13} />
              {Math.abs(Math.round(delta))}% vs mese prec.
            </div>
          )}
          {sub && (
            <div className="mt-1 text-xs" style={{ color: subColor || C.inkMuted, fontFamily: fontBody }}>{sub}</div>
          )}
        </div>
      );
    }

    // ---- verdetto in linguaggio naturale ----
    function Verdetto({ testo, tono }) {
      const colore = tono === "verde" ? C.green : tono === "corallo" ? C.coral : C.amber;
      const icone = tono === "verde" ? ["CircleCheck", "CheckCircle2", "CheckCircle"] : tono === "corallo" ? ["TriangleAlert", "AlertTriangle"] : ["Info"];
      return (
        <div className="flex items-start gap-2 mt-3 rounded-xl px-3 py-2.5"
          style={{ background: `${colore}14`, border: `1px solid ${colore}44` }}>
          <Icona nomi={icone} size={16} style={{ color: colore }} className="shrink-0 mt-0.5" />
          <span className="text-sm" style={{ color: C.ink, fontFamily: fontBody }}>{testo}</span>
        </div>
      );
    }

    function SegnaleCard({ s }) {
      const colore = s.tono === "verde" ? C.green : s.tono === "corallo" ? C.coral : C.amber;
      return (
        <div className="flex items-start gap-3 py-2.5" style={{ borderBottom: `1px solid ${C.hairline}` }}>
          <span className="w-2 h-2 rounded-full shrink-0 mt-1.5" style={{ background: colore }} />
          <div className="min-w-0">
            <div className="text-sm" style={{ color: C.ink, fontFamily: fontBody, fontWeight: 600 }}>{s.titolo}</div>
            {s.dettaglio && <div className="text-xs mt-0.5" style={{ color: C.inkMuted, fontFamily: fontBody }}>{s.dettaglio}</div>}
          </div>
        </div>
      );
    }

    // ---- drawer con il dettaglio dei trasferimenti tra conti ----
    function DrawerTrasferimenti({ trasferimenti, mese, onClose }) {
      const usciti = trasferimenti.filter((t) => t.importo < 0).reduce((s, t) => s + Math.abs(t.importo), 0);
      const entrati = trasferimenti.filter((t) => t.importo > 0).reduce((s, t) => s + t.importo, 0);
      const diff = usciti - entrati;
      const sbilanciato = Math.abs(diff) > 0.005;
      const ordinati = [...trasferimenti].sort((a, b) => b.dataObj - a.dataObj);

      // blocca lo scroll della pagina sotto e chiudi con tasto Esc
      useEffect(() => {
        const prev = document.body.style.overflow;
        document.body.style.overflow = "hidden";
        const onKey = (e) => { if (e.key === "Escape") onClose(); };
        window.addEventListener("keydown", onKey);
        return () => {
          document.body.style.overflow = prev;
          window.removeEventListener("keydown", onKey);
        };
      }, [onClose]);

      return (
        <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center"
          style={{ background: "rgba(15,22,19,0.85)", backdropFilter: "blur(5px)", WebkitBackdropFilter: "blur(5px)" }}
          onClick={onClose}>
          <div className="w-full md:max-w-lg rounded-t-3xl md:rounded-2xl flex flex-col overflow-hidden"
            style={{ background: C.surface, border: `1px solid ${C.hairline}`, maxHeight: "85vh", paddingBottom: "env(safe-area-inset-bottom)" }}
            onClick={(e) => e.stopPropagation()}>

            {/* intestazione */}
            <div className="flex items-center justify-between px-6 py-4 shrink-0" style={{ borderBottom: `1px solid ${C.hairline}` }}>
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-lg flex items-center justify-center" style={{ background: C.surfaceAlt, color: C.inkMuted }}>
                  <Icona nomi={["ArrowLeftRight"]} size={16} />
                </div>
                <div>
                  <div className="text-xs" style={{ color: C.inkMuted, letterSpacing: "0.08em" }}>TRA CONTI</div>
                  <div style={{ color: C.ink, fontFamily: fontDisplay, fontWeight: 700, fontSize: "0.95rem" }}>
                    {(mese || "").toUpperCase()}
                  </div>
                </div>
              </div>
              <button onClick={onClose} aria-label="Chiudi"
                className="w-8 h-8 rounded-full flex items-center justify-center"
                style={{ background: C.surfaceAlt, color: C.inkMuted }}>
                <Icona nomi={["X"]} size={15} />
              </button>
            </div>

            {/* sommario a tre colonne */}
            <div className="grid grid-cols-3 shrink-0" style={{ borderBottom: `1px solid ${C.hairline}` }}>
              <div className="flex flex-col items-center py-4" style={{ borderRight: `1px solid ${C.hairline}` }}>
                <div className="text-xs mb-1" style={{ color: C.inkMuted, letterSpacing: "0.05em" }}>MOVIMENTI</div>
                <div style={{ color: C.ink, fontFamily: fontDisplay, fontWeight: 700, fontSize: "1.05rem" }}>
                  {trasferimenti.length}
                </div>
              </div>
              <div className="flex flex-col items-center py-4" style={{ borderRight: `1px solid ${C.hairline}` }}>
                <div className="text-xs mb-1" style={{ color: C.inkMuted, letterSpacing: "0.05em" }}>→ USCITI</div>
                <div style={{ color: C.coral, fontFamily: fontDisplay, fontWeight: 700, fontSize: "1.05rem" }}>
                  € {euro(usciti)}
                </div>
              </div>
              <div className="flex flex-col items-center py-4">
                <div className="text-xs mb-1" style={{ color: C.inkMuted, letterSpacing: "0.05em" }}>← ENTRATI</div>
                <div style={{ color: C.green, fontFamily: fontDisplay, fontWeight: 700, fontSize: "1.05rem" }}>
                  € {euro(entrati)}
                </div>
              </div>
            </div>

            {/* avviso se i due lati non quadrano */}
            {sbilanciato && (
              <div className="mx-5 mt-4 shrink-0 flex items-start gap-2.5 rounded-xl px-4 py-3"
                style={{ background: `${C.amber}14`, border: `1px solid ${C.amber}44` }}>
                <Icona nomi={["CircleAlert", "AlertCircle"]} size={15} style={{ color: C.amber }} className="shrink-0 mt-0.5" />
                <div className="text-xs leading-relaxed" style={{ color: C.ink, fontFamily: fontBody }}>
                  I due lati non quadrano: <span style={{ color: C.amber, fontFamily: fontDisplay, fontWeight: 700 }}>€ {euro(diff)}</span> di differenza.
                  Probabilmente un movimento è un pagamento a terzi categorizzato come "Trasferimento": trovalo qui sotto e ricategorizzalo nel foglio.
                </div>
              </div>
            )}

            {/* lista movimenti */}
            <div className="overflow-y-auto flex-1 px-5 py-4 space-y-2" style={{ WebkitOverflowScrolling: "touch" }}>
              {ordinati.length === 0 && (
                <div className="text-center text-sm py-8" style={{ color: C.inkMuted, fontFamily: fontBody }}>
                  Nessun trasferimento in questo mese.
                </div>
              )}
              {ordinati.map((t, i) => (
                <div key={i} className="flex items-center gap-3 px-4 py-3 rounded-xl" style={{ background: C.surfaceAlt }}>
                  <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
                    style={{ background: C.surface, color: t.importo < 0 ? C.coral : C.green }}>
                    <Icona nomi={t.importo < 0 ? ["ArrowUpRight"] : ["ArrowDownLeft", "ArrowDownRight"]} size={14} />
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm truncate" style={{ color: C.ink, fontFamily: fontBody, fontWeight: 600 }}>
                      {t.descrizione || "(senza descrizione)"}
                    </div>
                    <div className="text-xs mt-0.5" style={{ color: C.inkMuted, fontFamily: fontBody }}>
                      {t.data}
                      {t.conto ? ` · ${t.conto}` : ""}
                      {t.metodo ? ` · ${t.metodo}` : ""}
                    </div>
                  </div>
                  <span style={{ color: t.importo < 0 ? C.coral : C.green, fontFamily: fontDisplay, fontWeight: 700, fontSize: "0.85rem", whiteSpace: "nowrap" }}>
                    {t.importo < 0 ? "→" : "←"} € {euro(t.importo)}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function CategoryBar({ nome, valore, max, attiva, onClick, colore, budget }) {
      const col = colore || colorFor(nome);
      let pct, barCol, destra;
      if (budget) {
        const rapporto = valore / budget.valore;
        pct = Math.min(100, Math.round(rapporto * 100));
        barCol = rapporto > 1 ? C.coral : rapporto > 0.85 ? C.amber : col;
        destra = (
          <span style={{ color: rapporto > 1 ? C.coral : C.inkMuted, fontFamily: fontDisplay }}>
            € {euro(valore)} <span style={{ opacity: 0.6 }}>/ {euro0(budget.valore)}</span>
          </span>
        );
      } else {
        pct = max > 0 ? Math.round((valore / max) * 100) : 0;
        barCol = col;
        destra = <span style={{ color: C.inkMuted, fontFamily: fontDisplay }}>€ {euro(valore)}</span>;
      }
      return (
        <button onClick={onClick}
          className="flex items-center gap-3 py-2.5 w-full text-left rounded-xl px-2 -mx-2 transition-colors"
          style={{ background: attiva ? C.surfaceAlt : "transparent" }}>
          <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
            style={{ background: attiva ? col : C.surfaceAlt, color: attiva ? C.bg : col, transition: "background 0.15s, color 0.15s" }}>
            <Icona nomi={iconeFor(nome)} size={15} />
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex justify-between text-sm mb-1">
              <span style={{ color: C.ink, fontFamily: fontBody, fontWeight: attiva ? 700 : 500 }}>{nome}</span>
              {destra}
            </div>
            <div className="h-1.5 rounded-full overflow-hidden" style={{ background: C.hairline }}>
              <div className="h-full rounded-full" style={{ width: `${pct}%`, background: barCol }} />
            </div>
          </div>
        </button>
      );
    }

    function AndamentoCategoria({ categoria, tipo, dati, meseCorrente }) {
      const col = tipo === "Entrata" ? C.green : colorFor(categoria);
      const valori = dati.map((d) => d.valore).filter((v) => v > 0);
      const media = valori.length ? valori.reduce((s, v) => s + v, 0) / valori.length : 0;
      const totale = dati.reduce((s, d) => s + d.valore, 0);

      return (
        <div className="rounded-2xl p-6" style={{ background: C.surface, border: `1px solid ${C.hairline}` }}>
          <div className="flex items-center justify-between mb-1 flex-wrap gap-2">
            <div className="text-xs" style={{ color: C.inkMuted, letterSpacing: "0.06em" }}>
              ANDAMENTO — {tipo === "Entrata" ? "ENTRATA" : "SPESA"}
            </div>
            <div className="flex items-center gap-2">
              <div className="w-6 h-6 rounded-md flex items-center justify-center" style={{ background: C.surfaceAlt, color: col }}>
                <Icona nomi={iconeFor(categoria)} size={13} />
              </div>
              <span className="text-sm" style={{ color: C.ink, fontFamily: fontBody, fontWeight: 700 }}>{categoria}</span>
            </div>
          </div>
          <div className="flex gap-4 mb-4 text-xs flex-wrap" style={{ color: C.inkMuted, fontFamily: fontBody }}>
            <span>Media mensile: <span style={{ color: C.ink, fontFamily: fontDisplay, fontWeight: 700 }}>€ {euro(media)}</span></span>
            <span>Totale periodo: <span style={{ color: C.ink, fontFamily: fontDisplay, fontWeight: 700 }}>€ {euro(totale)}</span></span>
          </div>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={dati} margin={{ left: -20, right: 10 }}>
              <CartesianGrid stroke={C.hairline} vertical={false} />
              <XAxis dataKey="mese" stroke={C.inkMuted} tick={{ fontSize: 10, fontFamily: fontBody }}
                axisLine={false} tickLine={false} interval="preserveStartEnd" />
              <YAxis hide />
              <Tooltip cursor={{ fill: `${C.hairline}55` }}
                contentStyle={{ background: C.surfaceAlt, border: `1px solid ${C.hairline}`, borderRadius: 10, fontFamily: fontBody, fontSize: 12 }}
                labelStyle={{ color: C.ink }} formatter={(v) => [`€ ${euro(v)}`, categoria]} />
              <ReferenceLine y={media} stroke={C.inkMuted} strokeDasharray="4 4" strokeOpacity={0.6} />
              <Bar dataKey="valore" radius={[5, 5, 0, 0]} maxBarSize={34}>
                {dati.map((d) => (
                  <Cell key={d.mese} fill={d.mese === meseCorrente ? col : `${col}55`} />
                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
          <div className="text-xs mt-1" style={{ color: C.inkMuted, fontFamily: fontBody }}>
            Linea tratteggiata = la tua media mensile. Barra piena = mese selezionato.
          </div>
        </div>
      );
    }

    function FisseVariabili({ fisse, variabili }) {
      const tot = fisse + variabili;
      const pctF = tot > 0 ? Math.round((fisse / tot) * 100) : 0;
      return (
        <div className="rounded-2xl p-6" style={{ background: C.surface, border: `1px solid ${C.hairline}` }}>
          <div className="text-xs mb-3" style={{ color: C.inkMuted, letterSpacing: "0.06em" }}>
            FISSE vs VARIABILI
          </div>
          <div className="h-3 rounded-full overflow-hidden flex" style={{ background: C.hairline }}>
            <div style={{ width: `${pctF}%`, background: "#7FB3D5" }} />
            <div style={{ width: `${100 - pctF}%`, background: C.amber }} />
          </div>
          <div className="flex justify-between mt-3 text-sm flex-wrap gap-2">
            <div>
              <div className="flex items-center gap-1.5 text-xs" style={{ color: C.inkMuted }}>
                <span className="w-2 h-2 rounded-full" style={{ background: "#7FB3D5" }} /> Fisse ({pctF}%)
              </div>
              <div style={{ color: C.ink, fontFamily: fontDisplay, fontWeight: 700 }}>€ {euro(fisse)}</div>
            </div>
            <div className="text-right">
              <div className="flex items-center gap-1.5 text-xs justify-end" style={{ color: C.inkMuted }}>
                <span className="w-2 h-2 rounded-full" style={{ background: C.amber }} /> Variabili ({100 - pctF}%)
              </div>
              <div style={{ color: C.ink, fontFamily: fontDisplay, fontWeight: 700 }}>€ {euro(variabili)}</div>
            </div>
          </div>
          <div className="text-xs mt-3" style={{ color: C.inkMuted, fontFamily: fontBody }}>
            Le variabili sono il margine su cui puoi agire davvero: le fisse cambiano solo disdicendo o rinegoziando.
          </div>
        </div>
      );
    }

    function ReceiptTape({ transazioni }) {
      return (
        <div className="relative">
          <div className="h-4 rounded-t-md"
            style={{ background: `radial-gradient(circle, ${C.bg} 3.5px, transparent 3.6px)`, backgroundSize: "16px 16px", backgroundPosition: "8px 4px", backgroundColor: C.paper }} />
          <div className="px-5 pb-2" style={{ background: C.paper }}>
            <div className="text-center text-xs pb-3 pt-1" style={{ color: C.paperMuted, fontFamily: fontDisplay, letterSpacing: "0.15em" }}>
              ULTIMI MOVIMENTI
            </div>
            {transazioni.length === 0 && (
              <div className="text-center text-sm py-6" style={{ color: C.paperMuted, fontFamily: fontBody }}>
                Nessun movimento nel periodo.
              </div>
            )}
            {transazioni.map((t, i) => (
              <div key={i} className="flex items-center justify-between py-2"
                style={{ borderBottom: i < transazioni.length - 1 ? `1px dashed ${C.paperMuted}55` : "none" }}>
                <div className="flex flex-col min-w-0 pr-2">
                  <span style={{ color: C.paperInk, fontFamily: fontBody, fontWeight: 600, fontSize: "0.85rem" }} className="truncate">
                    {t.descrizione}
                  </span>
                  <span style={{ color: C.paperMuted, fontFamily: fontBody, fontSize: "0.7rem" }}>
                    {t.data} · {t.categoria}
                  </span>
                </div>
                <span style={{ color: t.importo > 0 ? "#2E7D4F" : C.paperInk, fontFamily: fontDisplay, fontWeight: 700, fontSize: "0.85rem", whiteSpace: "nowrap" }}>
                  {t.importo > 0 ? "+" : "-"}€ {euro(t.importo)}
                </span>
              </div>
            ))}
          </div>
          <div className="h-3"
            style={{ background: C.paper, clipPath: "polygon(0% 0%,100% 0%,100% 60%,92% 100%,84% 60%,76% 100%,68% 60%,60% 100%,52% 60%,44% 100%,36% 60%,28% 100%,20% 60%,12% 100%,4% 60%,0% 100%)" }} />
        </div>
      );
    }

    function Dashboard() {
      const { loading, error, rows, budgetManuale, ricarica } = useSheetData();
      const [drawerTrasf, setDrawerTrasf] = useState(false);

      const mesiDisponibili = useMemo(() => {
        const uniq = [...new Set(rows.map((r) => r.mese))].filter(Boolean);
        return uniq
          .map((m, i) => ({ m, k: chiaveOrdinamentoMese(m, i) }))
          .sort((a, b) => a.k - b.k)
          .map((x) => x.m);
      }, [rows]);

      const [mese, setMese] = useState(null);
      useEffect(() => {
        if (!mese && mesiDisponibili.length > 0) setMese(mesiDisponibili[mesiDisponibili.length - 1]);
      }, [mesiDisponibili, mese]);

      const meseIndex = mesiDisponibili.indexOf(mese);
      const meseScorso = meseIndex > 0 ? mesiDisponibili[meseIndex - 1] : null;
      const mesiPrecedenti = meseIndex > 0 ? mesiDisponibili.slice(0, meseIndex) : [];

      const calcolaTotali = (m) => {
        const righe = rows.filter((r) => r.mese === m);
        const operative = righe.filter((r) => !r.trasferimento);
        const entrate = operative.filter((r) => r.importo > 0).reduce((s, r) => s + r.importo, 0);
        const uscite = operative.filter((r) => r.importo < 0).reduce((s, r) => s + Math.abs(r.importo), 0);
        const trasf = righe.filter((r) => r.trasferimento);
        const trasfOut = trasf.filter((r) => r.importo < 0).reduce((s, r) => s + Math.abs(r.importo), 0);
        const trasfIn = trasf.filter((r) => r.importo > 0).reduce((s, r) => s + r.importo, 0);
        return { entrate, uscite, trasfOut, trasfIn, trasfCount: trasf.length };
      };

      const corrente = mese ? calcolaTotali(mese) : { entrate: 0, uscite: 0, trasfOut: 0, trasfIn: 0, trasfCount: 0 };
      const precedente = meseScorso ? calcolaTotali(meseScorso) : null;
      const entrateDelta = precedente && precedente.entrate ? ((corrente.entrate - precedente.entrate) / precedente.entrate) * 100 : null;
      const usciteDelta = precedente && precedente.uscite ? ((corrente.uscite - precedente.uscite) / precedente.uscite) * 100 : null;
      const saldo = corrente.entrate - corrente.uscite;
      const tassoRisparmio = corrente.entrate > 0 ? saldo / corrente.entrate : null;

      // trasferimenti del mese selezionato (per il drawer di dettaglio)
      const trasferimentiMese = useMemo(() => {
        if (!mese) return [];
        return rows.filter((r) => r.mese === mese && r.trasferimento);
      }, [rows, mese]);

      // spese e entrate per categoria nel mese selezionato
      const perCategoria = (tipo) => {
        if (!mese) return [];
        const map = {};
        rows.filter((r) => r.mese === mese && r.tipo === tipo && !r.trasferimento).forEach((r) => {
          map[r.categoria] = (map[r.categoria] || 0) + Math.abs(r.importo);
        });
        return Object.entries(map).map(([nome, valore]) => ({ nome, valore })).sort((a, b) => b.valore - a.valore);
      };
      const categorieSpese = useMemo(() => perCategoria("Spesa"), [rows, mese]);
      const categorieEntrate = useMemo(() => perCategoria("Entrata"), [rows, mese]);

      // categoria + tipo selezionati per il grafico dei parziali
      const [selezione, setSelezione] = useState(null); // { nome, tipo }
      useEffect(() => {
        if (categorieSpese.length === 0 && categorieEntrate.length === 0) return;
        const pool = selezione && selezione.tipo === "Entrata" ? categorieEntrate : categorieSpese;
        const esiste = selezione && pool.some((c) => c.nome === selezione.nome);
        if (!selezione || !esiste) {
          if (categorieSpese.length > 0) setSelezione({ nome: categorieSpese[0].nome, tipo: "Spesa" });
          else setSelezione({ nome: categorieEntrate[0].nome, tipo: "Entrata" });
        }
      }, [categorieSpese, categorieEntrate]);

      const serieCategoria = useMemo(() => {
        if (!selezione) return [];
        return mesiDisponibili.map((m) => {
          const valore = rows
            .filter((r) => r.mese === m && r.tipo === selezione.tipo && r.categoria === selezione.nome)
            .reduce((s, r) => s + Math.abs(r.importo), 0);
          return { mese: m, valore: Math.round(valore * 100) / 100 };
        });
      }, [rows, mesiDisponibili, selezione]);

      const trend = useMemo(() => {
        const ultimiMesi = mesiDisponibili.slice(-6);
        return ultimiMesi.map((m) => {
          const t = calcolaTotali(m);
          return { mese: m, Entrate: Math.round(t.entrate), Uscite: Math.round(t.uscite) };
        });
      }, [rows, mesiDisponibili]);

      const transazioniRecenti = useMemo(() => {
        if (!mese) return [];
        return rows.filter((r) => r.mese === mese && !r.trasferimento).slice(-10).reverse();
      }, [rows, mese]);

      // fisse vs variabili nel mese
      const speseFisse = categorieSpese.filter((c) => CATEGORIE_FISSE.includes(c.nome)).reduce((s, c) => s + c.valore, 0);
      const speseVariabili = corrente.uscite - speseFisse;

      // media storica uscite (mesi precedenti a quello selezionato)
      const mediaUsciteStorica = useMemo(() => {
        if (mesiPrecedenti.length === 0) return null;
        const tot = mesiPrecedenti.reduce((s, m) => s + calcolaTotali(m).uscite, 0);
        return tot / mesiPrecedenti.length;
      }, [rows, mesiPrecedenti]);

      // media storica per categoria (solo spese, mesi precedenti)
      const mediaCategorie = useMemo(() => {
        const somme = {}; const conteggi = {};
        mesiPrecedenti.forEach((m) => {
          const perCat = {};
          rows.filter((r) => r.mese === m && r.tipo === "Spesa" && !r.trasferimento).forEach((r) => {
            perCat[r.categoria] = (perCat[r.categoria] || 0) + Math.abs(r.importo);
          });
          Object.entries(perCat).forEach(([c, v]) => {
            somme[c] = (somme[c] || 0) + v;
            conteggi[c] = (conteggi[c] || 0) + 1;
          });
        });
        const media = {};
        Object.keys(somme).forEach((c) => { media[c] = somme[c] / conteggi[c]; });
        return media;
      }, [rows, mesiPrecedenti]);

      // ---- budget per categoria: dal foglio "Budget" se presente, altrimenti automatico (media storica +5%) ----
      const budgets = useMemo(() => {
        const out = {};
        const arrotonda = (v) => Math.max(10, Math.round(v / 10) * 10);
        categorieSpese.forEach((c) => {
          if (budgetManuale[c.nome]) out[c.nome] = { valore: budgetManuale[c.nome], fonte: "manuale" };
          else if (mediaCategorie[c.nome]) out[c.nome] = { valore: arrotonda(mediaCategorie[c.nome] * 1.05), fonte: "auto" };
        });
        return out;
      }, [categorieSpese, mediaCategorie, budgetManuale]);
      const budgetTotale = Object.values(budgets).reduce((s, b) => s + b.valore, 0);
      const spesoConBudget = categorieSpese.filter((c) => budgets[c.nome]).reduce((s, c) => s + c.valore, 0);

      // ---- verdetto principale ----
      const verdetto = useMemo(() => {
        if (!mese) return null;
        if (mediaUsciteStorica === null || mediaUsciteStorica === 0) {
          return { testo: "Primo mese di dati: da qui in poi ogni mese potrò confrontarti con la tua media.", tono: "ambra" };
        }
        const diff = ((corrente.uscite - mediaUsciteStorica) / mediaUsciteStorica) * 100;
        if (Math.abs(diff) < 8) {
          return { testo: `Tutto regolare: le uscite sono in linea con la tua media (€ ${euro0(mediaUsciteStorica)} al mese).`, tono: "verde" };
        }
        if (diff > 0) {
          return {
            testo: `Stai spendendo il ${Math.round(diff)}% in più della tua media mensile (€ ${euro0(mediaUsciteStorica)}).`,
            tono: diff > 25 ? "corallo" : "ambra",
          };
        }
        return { testo: `Ottimo: stai spendendo il ${Math.abs(Math.round(diff))}% in meno della tua media mensile (€ ${euro0(mediaUsciteStorica)}).`, tono: "verde" };
      }, [mese, corrente.uscite, mediaUsciteStorica]);

      // ---- proiezione fine mese (solo se il mese è "in corso" nei dati) ----
      const proiezione = useMemo(() => {
        if (!mese || meseIndex !== mesiDisponibili.length - 1) return null;
        const { meseIdx, anno } = infoMese(mese);
        if (meseIdx === -1) return null;
        const giorniMese = new Date(anno || new Date().getFullYear(), meseIdx + 1, 0).getDate();
        const giorni = rows.filter((r) => r.mese === mese).map((r) => parseGiorno(r.data)).filter((g) => g !== null);
        if (giorni.length === 0) return null;
        const giornoMax = Math.max(...giorni);
        if (giornoMax < 5 || giornoMax >= giorniMese - 1) return null;
        return { valore: (corrente.uscite / giornoMax) * giorniMese, giorno: giornoMax, giorniMese };
      }, [rows, mese, meseIndex, mesiDisponibili, corrente.uscite]);

      // ---- segnali automatici ----
      const segnali = useMemo(() => {
        if (!mese) return [];
        const out = [];

        // budget sforati o quasi
        categorieSpese.forEach((c) => {
          const b = budgets[c.nome];
          if (!b || c.valore < 15) return;
          if (c.valore > b.valore) {
            out.push({
              tono: "corallo",
              titolo: `${c.nome} oltre budget: € ${euro0(c.valore)} su € ${euro0(b.valore)}`,
              dettaglio: b.fonte === "auto"
                ? `Budget automatico dalla tua media storica (≈ € ${euro0(mediaCategorie[c.nome] || b.valore)}/mese).`
                : "Budget impostato da te nel foglio.",
              peso: (c.valore - b.valore) + 2000,
            });
          } else if (c.valore > b.valore * 0.85) {
            out.push({
              tono: "ambra",
              titolo: `${c.nome} al ${Math.round((c.valore / b.valore) * 100)}% del budget (€ ${euro0(b.valore)})`,
              dettaglio: `Restano € ${euro0(b.valore - c.valore)}.`,
              peso: c.valore,
            });
          }
        });

        // spese singole anomale
        const mediaTx = {};
        const contTx = {};
        rows.filter((r) => r.tipo === "Spesa" && !r.trasferimento).forEach((r) => {
          mediaTx[r.categoria] = (mediaTx[r.categoria] || 0) + Math.abs(r.importo);
          contTx[r.categoria] = (contTx[r.categoria] || 0) + 1;
        });
        Object.keys(mediaTx).forEach((c) => (mediaTx[c] = mediaTx[c] / contTx[c]));
        const anomale = rows
          .filter((r) => r.mese === mese && r.tipo === "Spesa" && !r.trasferimento)
          .filter((r) => {
            const m = mediaTx[r.categoria] || 0;
            return contTx[r.categoria] >= 4 && Math.abs(r.importo) >= Math.max(60, m * 2.5);
          })
          .sort((a, b) => Math.abs(b.importo) - Math.abs(a.importo))
          .slice(0, 2);
        anomale.forEach((r) => {
          out.push({
            tono: "ambra",
            titolo: `Spesa fuori scala: ${r.descrizione || r.categoria} — € ${euro0(r.importo)}`,
            dettaglio: `Molto sopra la tua spesa tipica in ${r.categoria} (≈ € ${euro0(mediaTx[r.categoria])}).`,
            peso: Math.abs(r.importo),
          });
        });

        // microspese che si sommano
        const micro = rows.filter((r) => r.mese === mese && r.tipo === "Spesa" && !r.trasferimento && Math.abs(r.importo) > 0 && Math.abs(r.importo) < 15);
        const totMicro = micro.reduce((s, r) => s + Math.abs(r.importo), 0);
        if (micro.length >= 8) {
          out.push({
            tono: "ambra",
            titolo: `${micro.length} microspese sotto i €15 = € ${euro0(totMicro)}`,
            dettaglio: "Sono le spese più facili da dimenticare: da sole fanno una voce di bilancio.",
            peso: totMicro,
          });
        }

        // risparmio
        if (tassoRisparmio !== null) {
          if (tassoRisparmio < 0) {
            out.push({ tono: "corallo", titolo: "Questo mese hai speso più di quanto hai incassato", dettaglio: `Saldo € ${euro0(saldo)} in negativo.`, peso: 10000 });
          } else if (tassoRisparmio < 0.1) {
            out.push({ tono: "ambra", titolo: `Risparmio sottile: ${Math.round(tassoRisparmio * 100)}% delle entrate`, dettaglio: "Sotto il 10% basta un imprevisto per andare in rosso.", peso: 5000 });
          } else if (tassoRisparmio >= 0.2) {
            out.push({ tono: "verde", titolo: `Stai mettendo da parte il ${Math.round(tassoRisparmio * 100)}% delle entrate`, dettaglio: "Sopra il 20%: ottimo margine di sicurezza.", peso: 1 });
          }
        }

        // fisse troppo pesanti
        if (corrente.uscite > 0 && speseFisse / corrente.uscite > 0.6) {
          out.push({
            tono: "ambra",
            titolo: `Le spese fisse assorbono il ${Math.round((speseFisse / corrente.uscite) * 100)}% delle uscite`,
            dettaglio: "Margine di manovra ridotto: vale la pena rivedere abbonamenti e contratti.",
            peso: 3000,
          });
        }

        // categorie ben sotto media (max 1, per chiudere in positivo)
        const positive = categorieSpese
          .filter((c) => {
            const media = mediaCategorie[c.nome];
            return media && c.valore < media * 0.6 && media - c.valore >= 20;
          })
          .sort((a, b) => (mediaCategorie[b.nome] - b.valore) - (mediaCategorie[a.nome] - a.valore))
          .slice(0, 1);
        positive.forEach((c) => {
          out.push({
            tono: "verde",
            titolo: `${c.nome} ben sotto la tua media: € ${euro0(c.valore)} invece di ≈ € ${euro0(mediaCategorie[c.nome])}`,
            peso: 1,
          });
        });

        const ordine = { corallo: 0, ambra: 1, verde: 2 };
        return out.sort((a, b) => ordine[a.tono] - ordine[b.tono] || b.peso - a.peso).slice(0, 6);
      }, [rows, mese, categorieSpese, mediaCategorie, budgets, tassoRisparmio, saldo, speseFisse, corrente.uscite]);

      const maxSpese = categorieSpese.length ? Math.max(...categorieSpese.map((c) => c.valore)) : 0;
      const maxEntrate = categorieEntrate.length ? Math.max(...categorieEntrate.map((c) => c.valore)) : 0;

      return (
        <div className="min-h-screen w-full" style={{ background: C.bg, fontFamily: fontBody }}>
          {drawerTrasf && (
            <DrawerTrasferimenti
              trasferimenti={trasferimentiMese}
              mese={mese}
              onClose={() => setDrawerTrasf(false)}
            />
          )}
          <div className="max-w-5xl mx-auto px-4 py-8 md:py-12">
            <div className="flex items-center justify-between mb-8 flex-wrap gap-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: C.surfaceAlt, color: C.green }}>
                  <Icona nomi={["Wallet"]} size={19} />
                </div>
                <div>
                  <div style={{ color: C.ink, fontFamily: fontBody, fontWeight: 800 }} className="text-lg leading-none">Portafoglio</div>
                  <div className="flex items-center gap-1.5 mt-1">
                    <span className="w-1.5 h-1.5 rounded-full animate-pulse" style={{ background: loading ? C.amber : error ? C.coral : C.green }} />
                    <span className="text-xs" style={{ color: C.inkMuted, fontFamily: fontBody }}>
                      {loading ? "Caricamento dal foglio..." : error ? "Errore di lettura" : `Collegato a "${SHEET_NAME}"`}
                    </span>
                    {!loading && (
                      <button onClick={ricarica} title="Ricarica i dati dal foglio" className="ml-1 p-0.5 rounded" style={{ color: C.inkMuted }}>
                        <Icona nomi={["RefreshCw"]} size={11} />
                      </button>
                    )}
                  </div>
                </div>
              </div>
              {mesiDisponibili.length > 0 && (
                <SegmentToggle options={mesiDisponibili} value={mese} onChange={(m) => { setMese(m); setDrawerTrasf(false); }} />
              )}
            </div>

            {loading && (
              <div className="flex items-center gap-2 justify-center py-20" style={{ color: C.inkMuted }}>
                <Icona nomi={["LoaderCircle", "Loader2"]} size={18} className="animate-spin" /> Carico i dati dal foglio...
              </div>
            )}

            {error && (
              <div className="rounded-2xl p-6 flex items-start gap-3" style={{ background: C.surface, border: `1px solid ${C.coral}55` }}>
                <Icona nomi={["CircleAlert", "AlertCircle"]} size={18} style={{ color: C.coral }} className="shrink-0 mt-0.5" />
                <div style={{ color: C.ink, fontFamily: fontBody, fontSize: "0.9rem" }}>
                  {error}. Controlla che il foglio sia condiviso con accesso "Chiunque abbia il link" (visualizzatore).
                </div>
              </div>
            )}

            {!loading && !error && (
              <div className="grid md:grid-cols-5 gap-5">
                <div className="md:col-span-3 space-y-5">

                  {/* SALDO + VERDETTO */}
                  <div className="rounded-2xl p-6" style={{ background: C.surface, border: `1px solid ${C.hairline}` }}>
                    <div className="text-xs mb-2" style={{ color: C.inkMuted, letterSpacing: "0.06em" }}>
                      SALDO NETTO — {(mese || "").toUpperCase()}
                    </div>
                    <div style={{ color: saldo >= 0 ? C.ink : C.coral, fontFamily: fontDisplay, fontWeight: 700, fontSize: "2.5rem", lineHeight: 1.1 }}>
                      {saldo < 0 ? "-" : ""}€ {euro(saldo)}
                    </div>
                    {verdetto && <Verdetto testo={verdetto.testo} tono={verdetto.tono} />}
                    {proiezione && (
                      <Verdetto
                        testo={`Ritmo attuale (giorno ${proiezione.giorno} di ${proiezione.giorniMese}): a fine mese le uscite arriverebbero a circa € ${euro0(proiezione.valore)}.`}
                        tono={mediaUsciteStorica && proiezione.valore > mediaUsciteStorica * 1.1 ? "ambra" : "verde"}
                      />
                    )}
                    <div className="flex gap-3 mt-5 flex-wrap">
                      <StatChip label="ENTRATE" value={corrente.entrate} delta={entrateDelta} positive />
                      <StatChip label="USCITE" value={corrente.uscite} delta={usciteDelta} positive={false} />
                      <StatChip
                        label="RISPARMIO"
                        value={saldo}
                        sub={tassoRisparmio !== null ? `${Math.round(tassoRisparmio * 100)}% delle entrate` : "—"}
                        subColor={tassoRisparmio === null ? C.inkMuted : tassoRisparmio < 0 ? C.coral : tassoRisparmio < 0.1 ? C.amber : C.green}
                      />
                    </div>
                    {corrente.trasfCount > 0 && (
                      <button onClick={() => setDrawerTrasf(true)}
                        className="flex items-center gap-3 mt-3 rounded-2xl px-4 py-3 w-full text-left transition-colors"
                        style={{ background: C.surfaceAlt, border: `1px dashed ${Math.abs(corrente.trasfOut - corrente.trasfIn) > 0.005 ? C.amber + "88" : C.hairline}` }}>
                        <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{ background: C.surface, color: C.inkMuted }}>
                          <Icona nomi={["ArrowLeftRight"]} size={15} />
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="text-xs" style={{ color: C.inkMuted, letterSpacing: "0.04em" }}>
                            TRA CONTI — {corrente.trasfCount} {corrente.trasfCount === 1 ? "movimento" : "movimenti"} (esclusi dai totali)
                          </div>
                          <div className="text-sm mt-0.5" style={{ color: C.ink, fontFamily: fontDisplay, fontWeight: 700 }}>
                            → € {euro(corrente.trasfOut)} <span style={{ color: C.inkMuted, fontWeight: 400 }}>·</span> ← € {euro(corrente.trasfIn)}
                          </div>
                          {Math.abs(corrente.trasfOut - corrente.trasfIn) > 0.005 && (
                            <div className="text-xs mt-0.5" style={{ color: C.amber }}>
                              Non quadrano: € {euro(corrente.trasfOut - corrente.trasfIn)} di differenza — tocca per il dettaglio.
                            </div>
                          )}
                        </div>
                        <Icona nomi={["ChevronRight"]} size={15} style={{ color: C.inkMuted }} className="shrink-0" />
                      </button>
                    )}
                  </div>

                  {/* SEGNALI */}
                  <div className="rounded-2xl p-6" style={{ background: C.surface, border: `1px solid ${C.hairline}` }}>
                    <div className="text-xs mb-2" style={{ color: C.inkMuted, letterSpacing: "0.06em" }}>
                      SEGNALI DEL MESE
                    </div>
                    {segnali.length === 0 && (
                      <div className="text-sm py-3" style={{ color: C.inkMuted, fontFamily: fontBody }}>
                        Nessun segnale particolare: mese nella norma.
                      </div>
                    )}
                    {segnali.map((s, i) => <SegnaleCard key={i} s={s} />)}
                  </div>

                  {/* TREND */}
                  <div className="rounded-2xl p-6" style={{ background: C.surface, border: `1px solid ${C.hairline}` }}>
                    <div className="text-xs mb-4" style={{ color: C.inkMuted, letterSpacing: "0.06em" }}>
                      TREND ULTIMI MESI
                    </div>
                    <ResponsiveContainer width="100%" height={190}>
                      <AreaChart data={trend} margin={{ left: -20, right: 10 }}>
                        <defs>
                          <linearGradient id="gE" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor={C.green} stopOpacity={0.35} />
                            <stop offset="100%" stopColor={C.green} stopOpacity={0} />
                          </linearGradient>
                          <linearGradient id="gU" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor={C.coral} stopOpacity={0.3} />
                            <stop offset="100%" stopColor={C.coral} stopOpacity={0} />
                          </linearGradient>
                        </defs>
                        <CartesianGrid stroke={C.hairline} vertical={false} />
                        <XAxis dataKey="mese" stroke={C.inkMuted} tick={{ fontSize: 11, fontFamily: fontBody }} axisLine={false} tickLine={false} />
                        <YAxis hide />
                        <Tooltip
                          contentStyle={{ background: C.surfaceAlt, border: `1px solid ${C.hairline}`, borderRadius: 10, fontFamily: fontBody, fontSize: 12 }}
                          labelStyle={{ color: C.ink }} formatter={(v) => `€ ${euro(v)}`} />
                        <Area type="monotone" dataKey="Entrate" stroke={C.green} fill="url(#gE)" strokeWidth={2} />
                        <Area type="monotone" dataKey="Uscite" stroke={C.coral} fill="url(#gU)" strokeWidth={2} />
                      </AreaChart>
                    </ResponsiveContainer>
                    <div className="flex gap-4 mt-2">
                      <div className="flex items-center gap-1.5 text-xs" style={{ color: C.inkMuted }}>
                        <span className="w-2 h-2 rounded-full" style={{ background: C.green }} /> Entrate
                      </div>
                      <div className="flex items-center gap-1.5 text-xs" style={{ color: C.inkMuted }}>
                        <span className="w-2 h-2 rounded-full" style={{ background: C.coral }} /> Uscite
                      </div>
                    </div>
                  </div>

                  {/* ANDAMENTO CATEGORIA */}
                  {selezione && serieCategoria.length > 0 && (
                    <AndamentoCategoria categoria={selezione.nome} tipo={selezione.tipo} dati={serieCategoria} meseCorrente={mese} />
                  )}

                  {/* FISSE vs VARIABILI */}
                  {corrente.uscite > 0 && <FisseVariabili fisse={speseFisse} variabili={speseVariabili} />}

                  {/* SPESE PER CATEGORIA */}
                  <div className="rounded-2xl p-6" style={{ background: C.surface, border: `1px solid ${C.hairline}` }}>
                    <div className="flex items-center justify-between mb-1 flex-wrap gap-2">
                      <div className="text-xs" style={{ color: C.inkMuted, letterSpacing: "0.06em" }}>
                        SPESE PER CATEGORIA
                      </div>
                      {budgetTotale > 0 && (
                        <div className="text-xs" style={{ fontFamily: fontDisplay, color: spesoConBudget > budgetTotale ? C.coral : C.inkMuted }}>
                          € {euro0(spesoConBudget)} / {euro0(budgetTotale)} budget
                        </div>
                      )}
                    </div>
                    <div className="text-xs mb-2" style={{ color: `${C.inkMuted}99`, fontFamily: fontBody }}>
                      La barra è la quota di budget usata: ambra oltre l'85%, corallo se sforato. Tocca per l'andamento nel tempo.
                    </div>
                    {categorieSpese.map((c) => (
                      <CategoryBar key={c.nome} {...c} max={maxSpese} budget={budgets[c.nome]}
                        attiva={selezione && selezione.tipo === "Spesa" && c.nome === selezione.nome}
                        onClick={() => setSelezione({ nome: c.nome, tipo: "Spesa" })} />
                    ))}
                  </div>

                  {/* ENTRATE PER CATEGORIA */}
                  {categorieEntrate.length > 0 && (
                    <div className="rounded-2xl p-6" style={{ background: C.surface, border: `1px solid ${C.hairline}` }}>
                      <div className="text-xs mb-2" style={{ color: C.inkMuted, letterSpacing: "0.06em" }}>
                        ENTRATE PER CATEGORIA
                      </div>
                      {categorieEntrate.map((c) => (
                        <CategoryBar key={c.nome} {...c} max={maxEntrate} colore={C.green}
                          attiva={selezione && selezione.tipo === "Entrata" && c.nome === selezione.nome}
                          onClick={() => setSelezione({ nome: c.nome, tipo: "Entrata" })} />
                      ))}
                    </div>
                  )}
                </div>

                <div className="md:col-span-2">
                  <div className="sticky top-6">
                    <ReceiptTape transazioni={transazioniRecenti} />
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
