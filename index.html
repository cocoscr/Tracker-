<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Portafoglio</title>
  <meta name="theme-color" content="#0F1613" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spese" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👛</text></svg>" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap');
    html, body { background: #0F1613; margin: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo } = React;
    const { AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

    // ---- config: sostituisci con il tuo Sheet ID se cambia ----
    const SHEET_ID = "1J36Imy-qTi4Ubr3s-CuzBcgzU1PGtDSQlsjE0Ap3zIY";
    const SHEET_NAME = "Transazioni";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}&t=${Date.now()}`;

    const C = {
      bg: "#0F1613",
      surface: "#171F1B",
      surfaceAlt: "#1D2622",
      hairline: "#2A3630",
      ink: "#F4F1E8",
      inkMuted: "#9CA8A1",
      paper: "#F7F3E9",
      paperInk: "#241F16",
      paperMuted: "#8A8073",
      green: "#4ADE80",
      coral: "#F2777B",
      amber: "#E8B44C",
    };
    const fontDisplay = "'Space Mono', ui-monospace, 'SF Mono', Menlo, monospace";
    const fontBody = "'Manrope', ui-sans-serif, system-ui, -apple-system, sans-serif";

    const iconMap = {
      "Bollette": "⚡", "Utenze": "💡",
      "Assicurazioni": "🛡️",
      "Spese Personali": "👤",
      "Benzina": "⛽",
      "Cibo SM": "🛒",
      "Lavoro": "💼",
      "Salute": "🩺",
      "Abbonamenti": "🔁",
      "Casa": "🏠",
      "Regali": "🎁",
      "Stipendio": "💶",
      "Trasferte": "✈️", "Viaggi": "🧳",
      "PAC": "🐷", "Risparmi": "💰", "Rendimenti": "📈",
      "Macchina": "🚗",
      "Università": "🎓",
      "Carta di Credito": "💳",
      "Mangiare fuori": "🍕",
      "Uscite & Svago": "🎉",
      "Cura Personale": "✂️",
      "Pedaggi & Parcheggi": "🅿️",
      "Sport": "🏋️",
      "Vestiti": "👕",
      "Buffi": "🤝",
      "Multe/imprevisti": "⚠️",
    };
    const iconFor = (cat) => iconMap[cat] || "🏷️";

    function parseImporto(str) {
      if (!str) return 0;
      const negative = str.trim().startsWith("-");
      const cleaned = str.replace(/[^0-9,]/g, "");
      const normalized = cleaned.replace(",", ".");
      let val = parseFloat(normalized) || 0;
      return negative ? -Math.abs(val) : val;
    }

    const euro = (n) =>
      Math.abs(n).toLocaleString("it-IT", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    function useSheetData() {
      const [state, setState] = useState({ loading: true, error: null, rows: [] });

      useEffect(() => {
        let cancelled = false;
        fetch(CSV_URL)
          .then((res) => {
            if (!res.ok) throw new Error("Impossibile leggere il foglio (è condiviso come 'chiunque con il link'?)");
            return res.text();
          })
          .then((csvText) => {
            const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
            const rows = parsed.data
              .map((r) => ({
                data: r["Data"],
                tipo: (r["Tipo"] || "").trim(),
                descrizione: r["Descrizione"] || "",
                categoria: (r["Categoria"] || "Altro").trim(),
                metodo: r["Metodo"],
                conto: r["Conto"],
                importo: parseImporto(r["importo ricalcolato"]),
                mese: (r["Mese"] || "").trim(),
              }))
              .filter((r) => r.tipo === "Spesa" || r.tipo === "Entrata");
            if (!cancelled) setState({ loading: false, error: null, rows });
          })
          .catch((err) => {
            if (!cancelled) setState({ loading: false, error: err.message, rows: [] });
          });
        return () => { cancelled = true; };
      }, []);

      return state;
    }

    function SegmentToggle({ options, value, onChange }) {
      return (
        <div
          className="inline-flex rounded-full p-1 flex-wrap"
          style={{ background: C.surfaceAlt, border: `1px solid ${C.hairline}` }}
        >
          {options.map((k) => (
            <button
              key={k}
              onClick={() => onChange(k)}
              className="px-3 py-1 text-xs rounded-full transition-colors"
              style={{
                fontFamily: fontBody,
                fontWeight: 600,
                color: value === k ? C.bg : C.inkMuted,
                background: value === k ? C.green : "transparent",
              }}
            >
              {k}
            </button>
          ))}
        </div>
      );
    }

    function StatChip({ label, value, delta, positive }) {
      const hasDelta = delta !== null && delta !== undefined && isFinite(delta);
      const arrow = delta >= 0 ? "↗" : "↘";
      const good = positive ? delta >= 0 : delta < 0;
      return (
        <div className="flex-1 rounded-2xl p-4" style={{ background: C.surfaceAlt, border: `1px solid ${C.hairline}` }}>
          <div className="text-xs mb-1" style={{ color: C.inkMuted, fontFamily: fontBody, letterSpacing: "0.04em" }}>
            {label}
          </div>
          <div className="text-xl" style={{ color: C.ink, fontFamily: fontDisplay, fontWeight: 700 }}>
            € {euro(value)}
          </div>
          {hasDelta && (
            <div className="flex items-center gap-1 mt-1 text-xs" style={{ color: good ? C.green : C.coral, fontFamily: fontBody }}>
              <span>{arrow}</span>
              {Math.abs(Math.round(delta))}% vs mese prec.
            </div>
          )}
        </div>
      );
    }

    function CategoryBar({ nome, valore, max }) {
      const pct = max > 0 ? Math.round((valore / max) * 100) : 0;
      return (
        <div className="flex items-center gap-3 py-2.5">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 text-sm" style={{ background: C.surfaceAlt }}>
            {iconFor(nome)}
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex justify-between text-sm mb-1">
              <span style={{ color: C.ink, fontFamily: fontBody, fontWeight: 500 }}>{nome}</span>
              <span style={{ color: C.inkMuted, fontFamily: fontDisplay }}>€ {euro(valore)}</span>
            </div>
            <div className="h-1.5 rounded-full overflow-hidden" style={{ background: C.hairline }}>
              <div className="h-full rounded-full" style={{ width: `${pct}%`, background: C.amber }} />
            </div>
          </div>
        </div>
      );
    }

    function ReceiptTape({ transazioni }) {
      return (
        <div className="relative">
          <div
            className="h-4 rounded-t-md"
            style={{
              background: `radial-gradient(circle, ${C.bg} 3.5px, transparent 3.6px)`,
              backgroundSize: "16px 16px",
              backgroundPosition: "8px 4px",
              backgroundColor: C.paper,
            }}
          />
          <div className="px-5 pb-2" style={{ background: C.paper }}>
            <div className="text-center text-xs pb-3 pt-1" style={{ color: C.paperMuted, fontFamily: fontDisplay, letterSpacing: "0.15em" }}>
              ULTIMI MOVIMENTI
            </div>
            {transazioni.length === 0 && (
              <div className="text-center text-sm py-6" style={{ color: C.paperMuted, fontFamily: fontBody }}>
                Nessun movimento nel periodo.
              </div>
            )}
            {transazioni.map((t, i) => (
              <div
                key={i}
                className="flex items-center justify-between py-2"
                style={{ borderBottom: i < transazioni.length - 1 ? `1px dashed ${C.paperMuted}55` : "none" }}
              >
                <div className="flex flex-col min-w-0 pr-2">
                  <span style={{ color: C.paperInk, fontFamily: fontBody, fontWeight: 600, fontSize: "0.85rem" }} className="truncate">
                    {t.descrizione}
                  </span>
                  <span style={{ color: C.paperMuted, fontFamily: fontBody, fontSize: "0.7rem" }}>
                    {t.data} · {t.categoria}
                  </span>
                </div>
                <span
                  style={{
                    color: t.importo > 0 ? "#2E7D4F" : C.paperInk,
                    fontFamily: fontDisplay,
                    fontWeight: 700,
                    fontSize: "0.85rem",
                    whiteSpace: "nowrap",
                  }}
                >
                  {t.importo > 0 ? "+" : "-"}€ {euro(t.importo)}
                </span>
              </div>
            ))}
          </div>
          <div
            className="h-3"
            style={{
              background: C.paper,
              clipPath:
                "polygon(0% 0%,100% 0%,100% 60%,92% 100%,84% 60%,76% 100%,68% 60%,60% 100%,52% 60%,44% 100%,36% 60%,28% 100%,20% 60%,12% 100%,4% 60%,0% 100%)",
            }}
          />
        </div>
      );
    }

    function Dashboard() {
      const { loading, error, rows } = useSheetData();

      const mesiDisponibili = useMemo(() => {
        const uniq = [...new Set(rows.map((r) => r.mese))].filter(Boolean);
        return uniq;
      }, [rows]);

      const [mese, setMese] = useState(null);
      useEffect(() => {
        if (!mese && mesiDisponibili.length > 0) setMese(mesiDisponibili[mesiDisponibili.length - 1]);
      }, [mesiDisponibili, mese]);

      const meseIndex = mesiDisponibili.indexOf(mese);
      const meseScorso = meseIndex > 0 ? mesiDisponibili[meseIndex - 1] : null;

      const calcolaTotali = (m) => {
        const righe = rows.filter((r) => r.mese === m);
        const entrate = righe.filter((r) => r.tipo === "Entrata").reduce((s, r) => s + r.importo, 0);
        const uscite = righe.filter((r) => r.tipo === "Spesa").reduce((s, r) => s + Math.abs(r.importo), 0);
        return { entrate, uscite };
      };

      const corrente = mese ? calcolaTotali(mese) : { entrate: 0, uscite: 0 };
      const precedente = meseScorso ? calcolaTotali(meseScorso) : null;
      const entrateDelta = precedente && precedente.entrate ? ((corrente.entrate - precedente.entrate) / precedente.entrate) * 100 : null;
      const usciteDelta = precedente && precedente.uscite ? ((corrente.uscite - precedente.uscite) / precedente.uscite) * 100 : null;

      const categorie = useMemo(() => {
        if (!mese) return [];
        const map = {};
        rows.filter((r) => r.mese === mese && r.tipo === "Spesa").forEach((r) => {
          map[r.categoria] = (map[r.categoria] || 0) + Math.abs(r.importo);
        });
        return Object.entries(map)
          .map(([nome, valore]) => ({ nome, valore }))
          .sort((a, b) => b.valore - a.valore);
      }, [rows, mese]);

      const trend = useMemo(() => {
        const ultimiMesi = mesiDisponibili.slice(-6);
        return ultimiMesi.map((m) => {
          const t = calcolaTotali(m);
          return { mese: m, Entrate: Math.round(t.entrate), Uscite: Math.round(t.uscite) };
        });
      }, [rows, mesiDisponibili]);

      const transazioniRecenti = useMemo(() => {
        if (!mese) return [];
        return rows
          .filter((r) => r.mese === mese)
          .slice(-10)
          .reverse();
      }, [rows, mese]);

      const maxCat = categorie.length ? Math.max(...categorie.map((c) => c.valore)) : 0;
      const saldo = corrente.entrate - corrente.uscite;

      return (
        <div className="min-h-screen w-full" style={{ background: C.bg, fontFamily: fontBody }}>
          <div className="max-w-5xl mx-auto px-4 py-8 md:py-12">
            <div className="flex items-center justify-between mb-8 flex-wrap gap-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl flex items-center justify-center text-lg" style={{ background: C.surfaceAlt }}>
                  👛
                </div>
                <div>
                  <div style={{ color: C.ink, fontFamily: fontBody, fontWeight: 800 }} className="text-lg leading-none">
                    Portafoglio
                  </div>
                  <div className="flex items-center gap-1.5 mt-1">
                    <span className="w-1.5 h-1.5 rounded-full animate-pulse" style={{ background: loading ? C.amber : error ? C.coral : C.green }} />
                    <span className="text-xs" style={{ color: C.inkMuted, fontFamily: fontBody }}>
                      {loading ? "Caricamento dal foglio..." : error ? "Errore di lettura" : `Collegato a "${SHEET_NAME}"`}
                    </span>
                  </div>
                </div>
              </div>
              {mesiDisponibili.length > 0 && (
                <SegmentToggle options={mesiDisponibili.slice(-4)} value={mese} onChange={setMese} />
              )}
            </div>

            {loading && (
              <div className="flex items-center gap-2 justify-center py-20" style={{ color: C.inkMuted }}>
                <span className="spin">◌</span> Carico i dati dal foglio...
              </div>
            )}

            {error && (
              <div className="rounded-2xl p-6 flex items-start gap-3" style={{ background: C.surface, border: `1px solid ${C.coral}55` }}>
                <span style={{ color: C.coral }} className="shrink-0">⚠️</span>
                <div style={{ color: C.ink, fontFamily: fontBody, fontSize: "0.9rem" }}>
                  {error}. Controlla che il foglio sia condiviso con accesso "Chiunque abbia il link" (visualizzatore).
                </div>
              </div>
            )}

            {!loading && !error && (
              <div className="grid md:grid-cols-5 gap-5">
                <div className="md:col-span-3 space-y-5">
                  <div className="rounded-2xl p-6" style={{ background: C.surface, border: `1px solid ${C.hairline}` }}>
                    <div className="text-xs mb-2" style={{ color: C.inkMuted, letterSpacing: "0.06em" }}>
                      SALDO NETTO — {(mese || "").toUpperCase()}
                    </div>
                    <div style={{ color: C.ink, fontFamily: fontDisplay, fontWeight: 700, fontSize: "2.5rem", lineHeight: 1.1 }}>
                      € {euro(saldo)}
                    </div>
                    <div className="flex gap-3 mt-5 flex-wrap">
                      <StatChip label="ENTRATE" value={corrente.entrate} delta={entrateDelta} positive />
                      <StatChip label="USCITE" value={corrente.uscite} delta={usciteDelta} positive={false} />
                    </div>
                  </div>

                  <div className="rounded-2xl p-6" style={{ background: C.surface, border: `1px solid ${C.hairline}` }}>
                    <div className="text-xs mb-4" style={{ color: C.inkMuted, letterSpacing: "0.06em" }}>
                      TREND ULTIMI MESI
                    </div>
                    <ResponsiveContainer width="100%" height={190}>
                      <AreaChart data={trend} margin={{ left: -20, right: 10 }}>
                        <defs>
                          <linearGradient id="gE" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor={C.green} stopOpacity={0.35} />
                            <stop offset="100%" stopColor={C.green} stopOpacity={0} />
                          </linearGradient>
                          <linearGradient id="gU" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor={C.coral} stopOpacity={0.3} />
                            <stop offset="100%" stopColor={C.coral} stopOpacity={0} />
                          </linearGradient>
                        </defs>
                        <CartesianGrid stroke={C.hairline} vertical={false} />
                        <XAxis dataKey="mese" stroke={C.inkMuted} tick={{ fontSize: 11, fontFamily: fontBody }} axisLine={false} tickLine={false} />
                        <YAxis hide />
                        <Tooltip
                          contentStyle={{ background: C.surfaceAlt, border: `1px solid ${C.hairline}`, borderRadius: 10, fontFamily: fontBody, fontSize: 12 }}
                          labelStyle={{ color: C.ink }}
                          formatter={(v) => `€ ${euro(v)}`}
                        />
                        <Area type="monotone" dataKey="Entrate" stroke={C.green} fill="url(#gE)" strokeWidth={2} />
                        <Area type="monotone" dataKey="Uscite" stroke={C.coral} fill="url(#gU)" strokeWidth={2} />
                      </AreaChart>
                    </ResponsiveContainer>
                    <div className="flex gap-4 mt-2">
                      <div className="flex items-center gap-1.5 text-xs" style={{ color: C.inkMuted }}>
                        <span className="w-2 h-2 rounded-full" style={{ background: C.green }} /> Entrate
                      </div>
                      <div className="flex items-center gap-1.5 text-xs" style={{ color: C.inkMuted }}>
                        <span className="w-2 h-2 rounded-full" style={{ background: C.coral }} /> Uscite
                      </div>
                    </div>
                  </div>

                  <div className="rounded-2xl p-6" style={{ background: C.surface, border: `1px solid ${C.hairline}` }}>
                    <div className="text-xs mb-1" style={{ color: C.inkMuted, letterSpacing: "0.06em" }}>
                      SPESA PER CATEGORIA
                    </div>
                    {categorie.map((c) => (
                      <CategoryBar key={c.nome} nome={c.nome} valore={c.valore} max={maxCat} />
                    ))}
                  </div>
                </div>

                <div className="md:col-span-2">
                  <div className="sticky top-6">
                    <ReceiptTape transazioni={transazioniRecenti} />
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
